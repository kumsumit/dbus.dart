name: dbus
version: 0.7.12

description:
  A native Dart implementation of the D-Bus message bus client. This package
  allows Dart applications to directly access services on the Linux desktop.

homepage: https://github.com/canonical/dbus.dart

environment:
  sdk: '>=3.11.0 <4.0.0'

platforms:
  linux:
  windows:
  macos:

dependencies:
  args: ^2.0.0
  ffi: ^2.2.0
  meta: ^1.17.0
  xml: ^7.0.1

dev_dependencies:
  lints: ^6.1.0
  test: ^1.24.9
  test_cov: ^1.0.1

executables:
  dart-dbus: dart_dbus
